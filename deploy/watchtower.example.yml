services:
  watchtower:
    image: ${WATCHTOWER_IMAGE:-containrrr/watchtower:latest}
    container_name: watchtower-agent-infra
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.44}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable
      - --scope
      - agent-infra
      - --cleanup
      - --rolling-restart
      - --stop-timeout
      - 60s
      - --interval
      - "300"
